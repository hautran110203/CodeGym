<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký học viên</title>
</head>
<style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        fieldset {
            background-color: rgb(216, 235, 111);
            border: 2px solid #333;
            border-radius: 0;
            padding: 20px;
            width: 450px;
        }
        h2 {
            margin: 0 0 20px 0;
            color: #312eaf;
            background-color: aquamarine;
            font-size: 24px;
            text-transform: uppercase;
        }
        label {
            display: inline-block;
            width: 100px;
            color: #0815c9;
            
        }
        .color-text label {
            color: #000 !important;
        }
        input[type="text"], input[type="email"], input[type="number"], select {
            padding: 5px 10px;
            border: 1px solid #999;
            border-radius: 3px;
            width: 250px;
        }
        input[type="radio"] {
            margin-right: 5px;
        }
        .form-row {
            margin: 15px 0;
        }
  
        
    </style>
<body>
    <form action="register">
        <fieldset>
            <h2>Đăng ký học viên</h2>
            <table>
                <tr>
                    <td><label for="fullname">Họ và tên</label></td>
                    <td><input type="text" name="fullname" id="fullname"></td>
                </tr>
                <tr>
                    <td><label for="birthday">Ngày sinh</label></td>
                    <td><input type="text" name="birthday" id="birthday"></td>
                </tr>
                <tr>
                    <td><label for="gender">Giới tính</label></td>
                    <td>
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">Nam</label>
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">Nữ</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="address">Địa chỉ</label></td>
                    
                    <td><textarea name="address" id="address"></textarea></td>
                </tr>
                <tr>
                    <td><label for="class">Lớp</label></td>
                    <td>
                        <select name="class" id="class">
                            <option value="default">--Chọn lớp--</option>
                            <option value="C1">Lớp C1</option>
                            <option value="C2">Lớp C2</option>
                            <option value="C3">Lớp C3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="email">Email</label></td>
                    <td><input type="email" name="email" id="email"></td>
                </tr>
                <tr>
                    <td><label for="phone">Điện thoại</label></td>
                    <td><input type="number" name="phone" id="phone"></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Đăng ký">
                        <input type="reset" value="Nhập lại">
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
